name: Database Keep-Alive-TG Ping and Log

on:
  schedule:
    - cron: '47 * * * *'
  workflow_dispatch:

jobs:
  ping-and-log:
    runs-on: ubuntu-latest
    steps:
      - name: Install MySQL Client
        run: sudo apt-get update && sudo apt-get install -y mysql-client

      - name: Check and Create Tables
        env:
          DB_HOST: ${{ secrets.AVN_DB_HOST }}
          DB_PORT: ${{ secrets.AVN_DB_PORT }}
          DB_USER: ${{ secrets.AVN_DB_USER }}
          DB_PASS: ${{ secrets.AVN_DB_PASSWORD }}
          DB_NAME: ${{ secrets.AVN_DB_NAME }}
        run: |
          mysql --ssl-mode=REQUIRED -h "$DB_HOST" -P "$DB_PORT" -u "$DB_USER" -p"$DB_PASS" -D "$DB_NAME" <<EOF
          -- 日志表：记录每次 ping
          CREATE TABLE IF NOT EXISTS bh (
            id INT AUTO_INCREMENT PRIMARY KEY,
            ping_time TIMESTAMP DEFAULT CURRENT_TIMESTAMP,
            remark VARCHAR(255) DEFAULT 'GitHub Actions Keep-Alive'
          ) ENGINE=InnoDB DEFAULT CHARSET=utf8mb4;
          
          -- 状态表：记录最后一次运行状态
          CREATE TABLE IF NOT EXISTS keepalive_state (
            id INT PRIMARY KEY DEFAULT 1,
            last_status VARCHAR(10) DEFAULT 'unknown',
            updated_at TIMESTAMP DEFAULT CURRENT_TIMESTAMP ON UPDATE CURRENT_TIMESTAMP
          ) ENGINE=InnoDB DEFAULT CHARSET=utf8mb4;
          
          -- 初始化状态表（如果为空）
          INSERT IGNORE INTO keepalive_state (id, last_status) VALUES (1, 'unknown');
          EOF

      - name: Get Last Run Status
        id: get_status
        env:
          DB_HOST: ${{ secrets.AVN_DB_HOST }}
          DB_PORT: ${{ secrets.AVN_DB_PORT }}
          DB_USER: ${{ secrets.AVN_DB_USER }}
          DB_PASS: ${{ secrets.AVN_DB_PASSWORD }}
          DB_NAME: ${{ secrets.AVN_DB_NAME }}
        run: |
          # 查询上次运行状态
          LAST_STATUS=$(mysql --ssl-mode=REQUIRED -h "$DB_HOST" -P "$DB_PORT" -u "$DB_USER" -p"$DB_PASS" -D "$DB_NAME" -sN <<EOF
          SELECT last_status FROM keepalive_state WHERE id = 1;
          EOF
          )
          
          echo "last_status=$LAST_STATUS" >> $GITHUB_OUTPUT
          echo "上次运行状态: $LAST_STATUS"

      - name: Database Keep-Alive Operation
        id: database_operation
        env:
          DB_HOST: ${{ secrets.AVN_DB_HOST }}
          DB_PORT: ${{ secrets.AVN_DB_PORT }}
          DB_USER: ${{ secrets.AVN_DB_USER }}
          DB_PASS: ${{ secrets.AVN_DB_PASSWORD }}
          DB_NAME: ${{ secrets.AVN_DB_NAME }}
        continue-on-error: true
        run: |
          # 执行数据库插入
          if mysql --ssl-mode=REQUIRED -h "$DB_HOST" -P "$DB_PORT" -u "$DB_USER" -p"$DB_PASS" -D "$DB_NAME" <<EOF
          INSERT INTO bh (ping_time) VALUES (NOW());
          SELECT * FROM bh ORDER BY ping_time DESC LIMIT 3;
          EOF
          then
            echo "current_outcome=success" >> $GITHUB_OUTPUT
            echo "✅ Success: Database operation completed."
            exit 0
          else
            echo "current_outcome=failure" >> $GITHUB_OUTPUT
            echo "❌ Error: Database operation failed."
            exit 1
          fi

      - name: Determine If Should Send Notification
        id: should_send
        run: |
          CURRENT="${{ steps.database_operation.outputs.current_outcome }}"
          LAST="${{ steps.get_status.outputs.last_status }}"
          
          # 发送通知的条件：
          # 1. 失败：每次都发送
          # 2. 成功：只在状态变化时发送（unknown->success 或 failure->success）
          if [ "$CURRENT" = "failure" ]; then
            echo "should_send=true" >> $GITHUB_OUTPUT
            echo "send_reason=failure" >> $GITHUB_OUTPUT
            echo "失败，需要发送通知"
          elif [ "$CURRENT" = "success" ] && [ "$LAST" != "success" ]; then
            echo "should_send=true" >> $GITHUB_OUTPUT
            echo "send_reason=success_status_change" >> $GITHUB_OUTPUT
            echo "成功且状态变化（$LAST -> success），需要发送通知"
          else
            echo "should_send=false" >> $GITHUB_OUTPUT
            echo "成功但状态未变化，不发送通知"
          fi

      - name: Send Telegram Notification on Failure
        if: steps.should_send.outputs.should_send == 'true' && steps.database_operation.outputs.current_outcome == 'failure'
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          MESSAGE="⚠️ Database keep-alive FAILED at $(date) - Repository: ${{ github.repository }}"
          curl -s -X POST "https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/sendMessage" \
            -d chat_id="${TELEGRAM_CHAT_ID}" \
            -d text="${MESSAGE}"
          echo "失败通知已发送"

      - name: Send Telegram Success Notification
        if: steps.should_send.outputs.should_send == 'true' && steps.database_operation.outputs.current_outcome == 'success'
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          MESSAGE="✅ Database keep-alive SUCCESS at $(date) - Repository: ${{ github.repository }}"
          curl -s -X POST "https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/sendMessage" \
            -d chat_id="${TELEGRAM_CHAT_ID}" \
            -d text="${MESSAGE}"
          echo "成功通知已发送"

      - name: Update Database State with Current Status
        if: always() && steps.database_operation.outputs.current_outcome != ''
        env:
          DB_HOST: ${{ secrets.AVN_DB_HOST }}
          DB_PORT: ${{ secrets.AVN_DB_PORT }}
          DB_USER: ${{ secrets.AVN_DB_USER }}
          DB_PASS: ${{ secrets.AVN_DB_PASSWORD }}
          DB_NAME: ${{ secrets.AVN_DB_NAME }}
        run: |
          CURRENT="${{ steps.database_operation.outputs.current_outcome }}"
          
          # 更新状态表
          mysql --ssl-mode=REQUIRED -h "$DB_HOST" -P "$DB_PORT" -u "$DB_USER" -p"$DB_PASS" -D "$DB_NAME" <<EOF
          UPDATE keepalive_state 
          SET last_status = '$CURRENT', updated_at = NOW()
          WHERE id = 1;
          EOF
          
          echo "已更新数据库状态: last_status = $CURRENT"
